- name: configuring rabbitmq server
  hosts: rabbitmq
  become: yes
  tasks: 
  - name: copying rabbitmq to remote server
    copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo

  - name: install rabbitmq server
    package:
      name: rabbitmq-server
      state: present

  - name: start and enable services
    service: 
      name: rabbitmq-server
      state: started
      enabled: yes

  - name: create roboshopmq user
    community.rabbitmq.rabbitmq_user:
      user: roboshop
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present

      