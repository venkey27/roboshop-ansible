- name: configuring catalogue server
  hosts: redis
  become: yes
  tasks:
  - name: enable nodejs 20
    command: dnf module enable nodejs:20 -y

  - name: install nodejs 20
    package: 
      name: nodejs
      state: present

  - name: create roboshop system user 
    user:
      name: roboshop
      system: true
      home: /app
      shell : /sbin/nologin
      comment: "roboshop system user"