- name: configurating user server
  hosts: user
  become: yes
  tasks: 
    - name: enable 
      command: "dnf module enable nodejs:20 -y"

    - name: install nodejs -y
      package: 
        name: nodejs -y
        state: present

    - name: create roboshop system user 
      user:
        name: roboshop
        system: true
        home: /app
        shell : /sbin/nologin
        comment: "roboshop system user"

    - name: remove /app directory
      file:
        path: /app
        state: absent
    
    - name: delete user.zip in /tmp
      file:
        path: /tmp/user.zip
        state: absent

    - name: create app directory
      file:
        path: /app
        state: directory

    - name: download user
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
        dest: /tmp/user.zip 

    - name: unzip user
      unarchive:
        src: /tmp/user.zip
        dest: /app
        remote_src: yes

    - name: npm install dependencies
      community.general.npm:
        path: /app

    - name: copy user service 
      template:
        src: user.service.j2
        dest: /etc/systemd/system/user.service

    - name: demon reload user
      systemd_service:
        name: user
        daemon_reload: true

    - name: enable and restart
      service:
        name: user
        state: restarted 
        enabled: yes